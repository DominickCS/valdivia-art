# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches:
      - main

env:
  # Admin
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  # Email
  EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
  EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
  # JWT
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  EXPIRATION_MS: ${{ secrets.EXPIRATION_MS }}
  # Garage / S3
  GARAGE_BUCKET: ${{ secrets.GARAGE_BUCKET }}
  GARAGE_ENDPOINT: ${{ secrets.GARAGE_ENDPOINT }}
  GARAGE_PUBLIC_URL: ${{ secrets.GARAGE_PUBLIC_URL }}
  GARAGE_REGION: ${{ secrets.GARAGE_REGION }}
  # Postgres
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  # Stripe
  STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env file
        run: |
          cat > .env <<EOF
          VITE_API_URL=http://art.dominickcs.com:8081
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          GARAGE_ENDPOINT=${{ secrets.GARAGE_ENDPOINT }}
          GARAGE_BUCKET=${{ secrets.GARAGE_BUCKET }}
          GARAGE_REGION=${{ secrets.GARAGE_REGION }}
          GARAGE_PUBLIC_URL=${{ secrets.GARAGE_PUBLIC_URL }}
          GARAGE_ACCESS_KEY=${{ secrets.GARAGE_ACCESS_KEY }}
          GARAGE_SECRET_KEY=${{ secrets.GARAGE_SECRET_KEY }}
          STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EXPIRATION_MS=${{ secrets.EXPIRATION_MS }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EOF

      - name: Tear down existing stack and volumes
        run: docker compose -f compose.yml down -v --remove-orphans

      - name: Start stack and configure Garage
        run: bash backend/initGarageCICD.sh

      - name: Verify Garage env vars
        run: |
          echo "GARAGE_ACCESS_KEY is set: ${{ env.GARAGE_ACCESS_KEY != '' }}"
          echo "GARAGE_SECRET_KEY is set: ${{ env.GARAGE_SECRET_KEY != '' }}"

      - name: Pull latest images
        run: docker compose -f compose.yml pull

      - name: Rebuild and restart stack
        run: docker compose -f compose.yml up -d --build
